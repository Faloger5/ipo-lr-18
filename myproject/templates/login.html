<!DOCTYPE html>
<html>
<head>
    <title>Вход</title>
    <style>
        body { font-family: Arial; padding: 50px; }
        input { padding: 8px; width: 250px; margin: 5px 0; }
        button { padding: 8px 20px; background: #007bff; color: white; border: none; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Вход</h1>
    
    {% if form.errors %}
        <div class="error">Неверное имя пользователя или пароль.</div>
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Войти</button>
    </form>
    
    <p>Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
</body>
</html>
