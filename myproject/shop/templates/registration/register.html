<!-- templates/registration/register.html -->
{% extends 'shop/base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Регистрация</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Имя пользователя *</label>
                        {{ form.username }}
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Пароль *</label>
                        {{ form.password1 }}
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Подтверждение пароля *</label>
                        {{ form.password2 }}
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Полное имя</label>
                        <input type="text" name="full_name" class="form-control">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Телефон</label>
                        <input type="tel" name="phone" class="form-control" placeholder="+375XXXXXXXXX">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Адрес</label>
                        <textarea name="address" class="form-control" rows="2"></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Город доставки</label>
                            <input type="text" name="delivery_city" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Почтовый индекс</label>
                            <input type="text" name="postal_code" class="form-control">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
                </form>
                
                <div class="mt-3 text-center">
                    <p>Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
